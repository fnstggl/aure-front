<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      html, body { margin: 0; background: #060809; }
      #stage { position: relative; width: 1440px; height: 900px; }
      #stage img { position: absolute; inset: 0; width: 1440px; height: 900px; display: block; }
    </style>
  </head>
  <body>
    <div id="stage"></div>
    <script>
      const ORDER = [
        "base_plane", "background_grid", "customer_environment",
        "execution_layer", "scheduler", "workload_queue",
        "sidecar_boundary", "metadata_bridge", "advisory_return_path",
        "aurelius_control_plane", "constraint_engine", "audit_ledger",
        "blocked_payload", "metadata_packet",
        "labels", "annotations",
      ];
      const stage = document.getElementById("stage");
      for (const n of ORDER) {
        const img = document.createElement("img");
        img.src = "../public/diagrams/aurelius-control-plane/" + n + ".svg?" + Date.now();
        stage.appendChild(img);
      }
    </script>
  </body>
</html>
