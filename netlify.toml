# Netlify configuration for the Aurelius marketing site.
#
# This is a client-rendered single-page app: Vite builds a static bundle and
# react-router (BrowserRouter) handles routing in the browser. Two things must
# be configured for it to deploy cleanly on Netlify:
#   1. Deploy-safe caching so a new deploy never serves a stale entry document.
#   2. A catch-all rewrite to index.html so client-side routes resolve.

[build]
  command = "npm run build"
  publish = "dist"

# --- Caching ---------------------------------------------------------------
# Default for every path: never let the browser cache the HTML document.
# index.html is what points at the current content-hashed JS/CSS bundles, so it
# must be revalidated on every visit. A cached index.html keeps requesting the
# previous deploy's bundle hashes, which no longer exist after an atomic deploy
# -> blank/broken page until a manual refresh. This rule is also applied to the
# SPA-fallback responses below (every route returns index.html).
[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Build assets are content-hashed (e.g. /assets/index-DpjTXPaj.js). Their URL
# changes whenever their content changes, so they are safe to cache forever.
# This more-specific rule overrides the no-cache default above for /assets/ and
# guarantees a stale bundle can never be reused under a fresh URL.
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# --- SPA fallback ----------------------------------------------------------
# Real files are served when they exist (hashed assets, favicons, robots.txt,
# images, ...). For every other path, return index.html with a 200 so
# BrowserRouter can take over. Without this, deep links and hard refreshes on
# routes like /how-it-works, /safety or /docs 404 on Netlify.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
