# Netlify configuration for the Aurelius marketing site.
#
# This is a client-rendered single-page app: Vite builds a static bundle and
# react-router (BrowserRouter) handles routing in the browser. The build also
# prerenders each route's body to static HTML (scripts/prerender.mjs), so every
# indexable route ships as a real, content-filled file in dist/.
#
# Deploy notes:
#   1. Deploy-safe caching so a new deploy never serves a stale entry document.
#   2. The prerender step needs headless Chromium — installed below and cached
#      inside node_modules via PLAYWRIGHT_BROWSERS_PATH=0.
#   3. Because every valid route is a real prerendered file, unknown URLs fall
#      through to a real 404 (404.html) instead of a soft-200 SPA shell.

[build]
  command = "npx playwright install chromium && npm run build"
  publish = "dist"

[build.environment]
  # Install Playwright's Chromium into node_modules so Netlify's dependency
  # cache persists it across builds (avoids re-downloading every deploy).
  PLAYWRIGHT_BROWSERS_PATH = "0"

# --- Caching ---------------------------------------------------------------
# Default for every path: never let the browser cache the HTML document.
# index.html is what points at the current content-hashed JS/CSS bundles, so it
# must be revalidated on every visit. A cached index.html keeps requesting the
# previous deploy's bundle hashes, which no longer exist after an atomic deploy
# -> blank/broken page until a manual refresh. This rule is also applied to the
# SPA-fallback responses below (every route returns index.html).
[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Build assets are content-hashed (e.g. /assets/index-DpjTXPaj.js). Their URL
# changes whenever their content changes, so they are safe to cache forever.
# This more-specific rule overrides the no-cache default above for /assets/ and
# guarantees a stale bundle can never be reused under a fresh URL.
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# --- Unknown routes -> real 404 --------------------------------------------
# Every valid route is prerendered to its own dist/<route>/index.html, so deep
# links and hard refreshes resolve to a real static file (served before this
# non-forced redirect). Anything that does NOT match a file falls through here
# and is served the prerendered 404 document with a genuine 404 status — no more
# soft-200 SPA shell on unknown URLs. The in-app NotFound route still handles
# client-side navigation to bad paths without a server round-trip.
[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404
